<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>OpenShift Docs</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; line-height: 1.6; color: #24292e; }
  a { color: #0366d6; }
  pre { background: #f6f8fa; padding: 16px; border-radius: 6px; overflow-x: auto; }
  code { background: #f6f8fa; padding: 2px 6px; border-radius: 3px; font-size: 85%; }
  pre code { background: none; padding: 0; }
  blockquote { color: #586069; border-left: 3px solid #ddd; padding-left: 12px; margin-left: 0; }
  table { border-collapse: collapse; width: 100%; }
  th, td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
  th { background: #f6f8fa; }
  #nav { margin-bottom: 20px; font-size: 14px; }
  #error { color: #cb2431; }
</style>
</head><body>
<div id="nav"><a href="index.html">← Table of Contents</a> | <span id="filepath"></span></div>
<div id="content">Loading...</div>
<div id="error"></div>
<script>
  const params = new URLSearchParams(window.location.search);
  const doc = params.get("doc");
  document.getElementById("filepath").textContent = doc || "";
  if (doc) {
    document.title = doc.split("/").pop().replace(".md","") + " — OpenShift Docs";
    fetch(doc)
      .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(md => { document.getElementById("content").innerHTML = marked.parse(md); })
      .catch(e => {
        document.getElementById("content").textContent = "";
        document.getElementById("error").textContent = "Failed to load: " + doc;
      });
  } else {
    document.getElementById("content").textContent = "No document specified.";
  }
</script>
</body></html>
